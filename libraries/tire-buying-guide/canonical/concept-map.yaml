concepts:
  tire_structure:
    title: 轮胎结构安全模型
    thesis: 胎面、胎侧、胎体、胎圈承担的功能不同；胎侧是最薄弱区域，侧面损伤不能按胎面补胎逻辑处理。
    load_bearing_points: [胎侧无钢丝层保护, 鼓包通常意味着帘布层/帘线损伤, 胎面扎钉和胎侧鼓包安全等级不同]
    use_when: [胎侧鼓包, 侧面扎破, 露钢丝, 能不能补]
    source: {version: v2, chapter: 第一章 1.3 / 第四章 4.1.5, page_range: 4-5,48}
  parameter_tradeoffs:
    title: 轮胎参数取舍模型
    thesis: 胎宽、扁平比、载重指数、速度级别不是越高越好；必须先满足原车安全边界，再围绕舒适、操控、能耗、耐久做取舍。
    load_bearing_points: [载重指数不能低于原厂建议, 速度级别不能低于原厂建议, 低扁平比更易鼓包且更颠, 宽胎可能增加能耗]
    use_when: [规格解读, 能不能换尺寸, 新能源 XL, 轮胎参数]
    source: {version: v2, chapter: 第一章 2, page_range: 7-10}
  scenario_selection:
    title: 场景优先选胎模型
    thesis: 选胎先匹配真实使用场景，再选品牌型号；城市舒适、高速操控、新能源静音、北方冰雪对应不同优先级。
    load_bearing_points: [不要追求全能胎, 冰雪场景优先冬季胎, 新能源重车优先载重和静音, 高速山路接受硬吵贵]
    use_when: [买轮胎, 品牌型号选择, 家用通勤, 高速山路, 北方冰雪, 新能源静音]
    source: {version: v2, chapter: 第五章 5.1, page_range: 51-53}
  consumer_risk:
    title: 轮胎消费陷阱模型
    thesis: 静音棉、自修复、防爆、低滚阻、超耐磨、OE 标识都有真实收益，但往往伴随维护复杂度、抓地牺牲或溢价。
    load_bearing_points: [低滚阻可能牺牲湿地抓地, 超耐磨可能更硬更吵, 静音棉补胎复杂, OE 标识不总是值得溢价]
    use_when: [消费避坑, 静音棉, 自修复, 防爆胎, OE认证, 低滚阻]
    source: {version: v2, chapter: 第四章 4.2, page_range: 49-50}
